# ============================================================================
# 台積電 EPS 試算 — 假設檔 (assumptions.yaml)
# ----------------------------------------------------------------------------
# 這是你「手動輸入」的核心檔案。整個試算就是照這裡的數字跑出來的。
#
# ★ 重要:每個數字都附一個 source 欄位,報告會逐條列出,方便回頭檢查。
#
# 單位約定(和程式一致,別搞混):
#   - 營收(美元)  : 十億美元 Billion USD。 45.2 = 452 億美元
#   - 匯率        : 1 美元換多少台幣。 32.0
#   - 百分比      : 直接填數字。 66.0 代表 66.0%(不要填 0.66)
#   - 股數        : 十億股。 25.93 = 259.3 億股
#   - EPS         : 台幣元 / 股
#
# 本檔 guidance 區塊 = TSMC 2026Q2 法說會對 3Q26 的「業績展望」(公司官方)。
# tax/non_op 非法說指引項目,採近4季 FinMind 實際均值(來源如各列所註)。
# ============================================================================

quarter_label: "2026Q3"          # 要試算哪一季

# ----------------------------------------------------------------------------
# A. 法說會指引(公司官方給的,最有份量)— 來源:TSMC 2026Q2 法說會 3Q26 業績展望
# ----------------------------------------------------------------------------
guidance:
  # 季營收區間(十億美元)。3Q26 展望:44.6 - 45.8
  revenue_usd:
    low: 44.6
    high: 45.8
    source: "TSMC 2026Q2 法說會 3Q26 業績展望:營業收入淨額 44.6-45.8 億美元(十億美元)"

  # 毛利率區間(%)。3Q26 展望:65.0% - 67.0%
  gross_margin:
    low: 65.0
    high: 67.0
    source: "TSMC 2026Q2 法說會 3Q26 業績展望:營業毛利率 65.0%-67.0%"

  # 美元兌台幣匯率假設。3Q26 展望:32.0
  fx_usdtwd:
    value: 32.0
    source: "TSMC 2026Q2 法說會 3Q26 業績展望:平均匯率假設 32.0(美元兌新台幣)"

# ----------------------------------------------------------------------------
# B. 模型假設
#   - opex_ratio 直接由法說「營業淨利率」推算(見下),等於採用官方營業利益率展望
#   - tax / non_op 法說沒給,採近4季 FinMind 實際均值
# ----------------------------------------------------------------------------
model_assumptions:
  opex_ratio:            # 營業費用率(%)= 營業費用 / 營收
    value: 9.0
    source: "TSMC 2026Q2 法說會 3Q26 業績展望:毛利率−營業淨利率換算(中點 66%−57%=9%;高低標皆為 9pp,故三情境營業淨利率剛好對齊 56-58%)"

  tax_rate:              # 有效稅率(%)
    value: 16.2
    source: "近4季 FinMind 實際均值(2025Q2-2026Q1 約 14-19%,平均 16.2%);反映 2026 全球最低稅負"

  non_op_ratio:          # 業外收支佔營收比(%)。台積電通常小幅正值(利息+投資收益)
    value: 2.7
    source: "近4季 FinMind 實際均值(2025Q2-2026Q1 約 2.5-3.2%,平均 2.7%)"

  shares_billion:        # 流通在外股數(十億股)
    value: 25.93
    source: "FinMind:母公司業主淨利 ÷ EPS 反推 ≈ 259.3 億股"

# ----------------------------------------------------------------------------
# C. 分析師共識(算「預期差」用;不填就跳過這一段)
# ----------------------------------------------------------------------------
consensus:
  # ⚠️ 舊的 2025Q1 共識(13/58)對 3Q26 沒有意義,已移除。
  #    等你拿到「3Q26 分析師共識 EPS」,把下面兩段取消註解並填入 value 即可自動算預期差。
  # eps_quarter:
  #   value: 28.0
  #   source: "分析師 3Q26 單季共識(請填,如 FactSet/Bloomberg/券商報告)"
  # eps_annual:
  #   value: 105.0
  #   source: "分析師 2026 全年共識(請填)"

# ----------------------------------------------------------------------------
# D. 估值設定
# ----------------------------------------------------------------------------
valuation:
  # 年化方式:
  #   ttm = 最近3季『實際EPS』 + 本季『試算EPS』(滾動12月,較嚴謹,建議)
  #   x4  = 本季試算 × 4(較粗略,適合只想快速看)
  annualize_method: "ttm"

  # 現價(選填):做「現價 vs 估值」比較用。
  #   - 留白/註解掉:auto 模式會自動抓 TWSE 最新收盤價
  #   - 想自己指定:取消註解並填 value
  # current_price:
  #   value: 2470
  #   source: "手動填入"

# ----------------------------------------------------------------------------
# E. 估值儀表板 / PEG 成長率(auto 模式優先用 yfinance,抓不到才用這裡手填)
# ----------------------------------------------------------------------------
dashboard:
  # PEG 的「盈餘成長率」來源:
  #   auto 模式會先抓 yfinance 的 2026/2027 共識EPS 自動算成長率;
  #   抓不到(或手動模式)才用下面的手填值。
  #   兩種填法二選一:(a) 填兩個共識EPS 讓程式算成長  (b) 直接填成長率%
  consensus_eps_2026: null       # 例:107.5(今年 FY 共識 EPS,台幣)
  consensus_eps_2027: null       # 例:134.9(明年 FY 共識 EPS,台幣)
  growth_pct: null               # 或直接填成長率%,例:25.5(優先於上面兩個EPS)
  source: "手動填入(未抓到 yfinance 時)"
