# ============================================================================
# 兩層選股篩選器 — 參數檔 (screener.yaml)
# ----------------------------------------------------------------------------
#  所有門檻都寫在這裡,方便日後調整,程式不寫死。
# 只用「公開市場數據」做估值/品質研究,無任何持倉或交易紀錄;結果非買進清單。
#
# 兩層邏輯:
#   第一層 資格篩選:6 條全部通過才進池(排地雷)。
#   第二層 品質篩選:在通過第一層者中「標記」4 項達標與否,不淘汰。
# 誠實原則:某條件因資料缺失無法判斷 → 標「資料不足」,一律不當通過。
# ============================================================================

universe:
  market: "twse"              # 台股上市(FinMind);tpex=上櫃
  only_common_stock: true     # 只留 4 碼普通股(排除 ETF 00xx、權證、存託憑證等)
  stock_ids: []               # 指定台股代號清單(測試用);空 = 全市場
  limit: 0                    # 0=不限;>0 只取前 N 檔(測試用)
  extra_us: ["TSLA"]          # 額外美股(yfinance,測試用);和台股並存,跑同一套兩層篩選

fetch:
  financial_start: "2018-01-01"  # 財報起抓日(要 ≥ 需要的最長年窗 + 緩衝)
  price_lookback_days: 150       # 抓近幾天日成交金額(算流動性,>60 個交易日即可)
  sleep_seconds: 0.6             # 每次 API 之間睡秒數(禮貌 + 降低限流機率)
  refetch_after_days: 3          # 本地檔 ≤ N 天就跳過不重抓(可續跑 resumable)
  deep_fetch_only_liquid: true   # 只對「通過流動性」的股票深抓財報(大幅省請求)
  valuation: true                # 額外抓估值(前瞻PE/PEG/FCF Yield,yfinance)。全市場放大想省請求可設 false

# ---------------------------------------------------------------------------
# 第一層:資格篩選(6 條全過才進池)
# ---------------------------------------------------------------------------
layer1:
  listed_years:
    min: 5                    # 上市滿 5 年(以最早財報季度為代理判斷)
  eps_positive:
    years: 5                  # 看近 5 年
    min_positive_years: 4     # 至少 4 年 EPS 為正
  ocf_positive:
    years: 3                   # 看近 3 年(≈12 季)——改看長期,濾掉擴張期單季波動
    min_positive_years: 2      # 近 3 年至少 2 年『全年 OCF』為正
    require_cumulative_positive: true  # 且近 3 年『累積 OCF』為正(長期真的收得到現金)
  debt_ratio:
    # 口徑:有息負債比 =(短期借款+長期借款+應付公司債)÷ 總資產。
    #   (FinMind 未單獨列「一年內到期長期負債」,多已含在短期借款,故以此三項加總。)
    #   總資產抓不到時,退回「淨負債/權益 =(有息負債−現金)÷ 股東權益」,報告會註明口徑。
    basis: "interest_bearing"
    default_max_pct: 40         # 預設有息負債比門檻(真正的財務槓桿警戒線)
    # 產業別門檻覆寫(FinMind industry_category 字串 → 門檻%),方便調整:
    industry_overrides:
      "半導體業": 40            # 半導體製造 / IC 設計(台積電、聯發科、瑞昱、日月光…)
      "其他電子業": 50          # 電子代工 / 組裝(鴻海…)
      "電子工業": 50            # 含系統組裝 / 電源(廣達、台達電…)
      "電腦及週邊設備業": 50    # ODM / NB 組裝(仁寶、緯創…)
      "電子零組件業": 50
      # 美股(yfinance industry 字串)——資本密集業別可放寬,其餘用 default:
      "Auto Manufacturers": 50  # 汽車製造(TSLA…)
      "Semiconductors": 40
    net_debt_equity_max_pct: 40  # 退回口徑(淨負債/權益)門檻%
    exclude_financial: true     # 金融股排除此條
    financial_id_min: 2800
    financial_id_max: 2890
  liquidity:
    days: 60                    # 近 60 個交易日
    min_avg_value: 50000000     # 台股:日均成交金額 > 5000 萬(新台幣)
    min_avg_value_us: 10000000  # 美股:日均成交額 > 1000 萬(美元)
  latest_report:
    max_age_days: 200         # 最新財報須在近 N 天內(排除財報難產)

# ---------------------------------------------------------------------------
# 第二層:品質篩選(通過第一層者中標記,不淘汰)
# ---------------------------------------------------------------------------
layer2:
  revenue_cagr:
    years: 3                  # 近 3 年營收 CAGR
    min_pct: 10               # > 10%
  gross_margin_trend:
    years: 3                  # 近 3 年毛利率
    min_slope: 0.0            # 線性迴歸斜率(百分點/年)≥ 0(持平或上升)
  roe:
    years: 3                  # 近 3 年 ROE
    min_avg_pct: 15           # 平均 > 15%
    equity_basis: "parent"    # parent=母公司權益(總資產−總負債−非控制權益);total=股東權益總額
  momentum:
    source: "history"         # history=讀 data/consensus/<代號>.csv;off=一律資料不足
    min_pct: 0.5              # 共識今年EPS 相對前值變動 ≥ 此% 才算「上修/下修」
    gating: false             # false=僅標記不列入「兩層全過」判定(依原則,等回測驗證後才加權)

# ---------------------------------------------------------------------------
# 估值旗標層(只加旗標、不淘汰任何標的)
#   在「通過第一層」的清單上,每檔給一個估值旗標:
#     🟢 合理偏低:PEG < green_peg_below 且 前瞻PE < 該股近N年PE中位數
#     🔴 高估值警戒:前瞻PE > 該股近N年PE的90百分位,或 PEG > red_peg_above,或 前瞻PE > red_pe_above
#     🟡 一般:其餘
#   ★ PE 百分位用「個股自己的歷史」,不用全市場平均(不同產業 PE 水準天生不同)。
# ---------------------------------------------------------------------------
valuation_flag:
  pe_history_years: 5         # 用個股近 N 年『每日本益比』分布(中位數 / 90百分位)
  green_peg_below: 1.0        # 🟢 需 PEG < 此值(且前瞻PE < 個股近N年PE中位數)
  red_peg_above: 2.0          # 🔴 PEG > 此值
  red_pe_above: 60            # 🔴 前瞻PE > 此值
  red_pe_above_p90: true      # 🔴 前瞻PE > 個股近N年PE的90百分位

# ===========================================================================
# 可分析母體建構(build_universe.py)— 篩選器的「基礎池」
# ---------------------------------------------------------------------------
# 目的:只保留「有分析師覆蓋、有法說會、資訊揭露充分」的中大型股當母體,
#       認知圈外的標的一律排除。母體會存成 config/universe.yaml 供篩選器讀取。
# ★ 市值與覆蓋家數等門檻都在這裡,可自行調整。
# ===========================================================================
universe_builder:
  reliable_coverage: 3             # 共識覆蓋 < 此值 → 下游 PEG/修正動能 標記「僅供參考,不得作為判斷依據」
  tw:
    min_market_cap: 30000000000    # 市值 > 300 億台幣
    min_analyst_coverage: 1        # 母體門檻降到 1(有任何共識即可);守門靠法說會+市值+流動性
                                   #   ↑ 因 yfinance 對台股覆蓋家數常低估,硬卡 ≥3 會誤刪好股;
                                   #     改「不刪、只標記」:覆蓋<reliable_coverage 者下游自我標註不可信
    require_meeting: true          # 近一年有召開法人說明會(公開資訊觀測站 MOPS)
    meeting_lookback_days: 365
    min_avg_value: 100000000       # 近60日日均成交額 > 1 億台幣
  us:
    min_market_cap: 2000000000     # 市值 > 20 億美元
    min_analyst_coverage: 5        # 美股 yfinance 覆蓋可靠,維持 ≥5
    require_earnings_call: true    # 有季度法說(以 yfinance 有季度共識為代理)
    min_avg_value: 20000000        # 近60日日均成交額 > 2000 萬美元
  liquidity_days: 60               # 流動性看近幾個交易日
  # 測試候選清單(空 = 全市場;先跑台股確認合理再放大)
  tw_test_ids: ["2330","2454","2317","2308","2382","3711","2379","2412","2303","1301",
                "2002","2882","2891","3034","4938","2357","3008","2049","2727","8454",
                "2731","6415","1476","9910"]
  us_test_ids: ["TSLA","GOOGL","NVDA"]
