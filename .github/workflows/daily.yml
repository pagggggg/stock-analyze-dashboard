# ============================================================================
# 輕量重建 + 部署(GitHub Actions)—— 只在「你 push 程式碼 / 手動」時跑
# ----------------------------------------------------------------------------
# 分工(和 Mac mini launchd 不重複):
#   • Mac mini(scripts/*.sh + launchd)負責「重活」:每日股價、每週財報/共識、
#     每月重建母體、以及部署;其資料 commit 都帶 [skip ci],故【不會】觸發本 workflow。
#   • 本 CI 只負責:你從別台電腦 push 程式碼、或手動按 Run 時,重建網站 + 部署一次。
#     ★ 已移除每日 schedule → 不再和 Mac mini 每天重複抓取。
#
# 注意:本 CI 會 build --from-universe(讀 config/universe.yaml)。母體很大時這步會較久,
#       屆時可改成手動(把下方 push 觸發拿掉,只留 workflow_dispatch)。
# 首次:Settings → Pages → Source 選「Deploy from a branch」→ gh-pages /(root)。
# (選填)Secrets 新增 FINMIND_TOKEN 提高抓取額度。
# ============================================================================
name: rebuild-deploy

on:
  push:
    branches: [main]          # 你 push 程式碼時重建部署(Mac mini 的資料 commit 帶 [skip ci],不觸發)
  workflow_dispatch: {}       # 手動:Mac mini 沒開時的備援部署

permissions:
  contents: write             # 只用來推 gh-pages(不 commit 資料回 main —— 資料由 Mac mini 主管)

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site (母體;--no-record 不動資料狀態,狀態由 Mac mini 主管)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python build_site.py --from-universe --no-record --out public

      - name: Deploy public/ to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          touch .nojekyll
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -q -m "deploy(ci): $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
