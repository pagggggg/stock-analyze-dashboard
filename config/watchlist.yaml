# ============================================================================
# 觀察清單 (watchlist.yaml)
# ----------------------------------------------------------------------------
# 要掃描的台股(上市)。本工具只用「公開市場數據」做估值研究,
# 不含任何持倉、成本或個人交易紀錄。
#
#   stock_id : 台股代號(字串)
#   name     : 顯示名稱
#   guidance : (選填)法說會指引檔路徑;有填才會多做「三情境 EPS 試算」,
#              沒填的股票就用「分析師共識 EPS」算前瞻PE(仍可跨股比較)。
# ============================================================================
stocks:
  - stock_id: "2330"
    name: "台積電"
    guidance: "config/assumptions.yaml"
  - stock_id: "2454"
    name: "聯發科"
  - stock_id: "2317"
    name: "鴻海"
  - stock_id: "2308"
    name: "台達電"
  - stock_id: "2382"
    name: "廣達"
  - stock_id: "3711"
    name: "日月光投控"
  - stock_id: "2379"
    name: "瑞昱"
  - stock_id: "2412"
    name: "中華電"

settings:
  pe_years: 10          # 本益比河道 / 區間取近幾年
